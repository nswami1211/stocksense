<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stock Sense — Smart Supermarket OS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b10;
  --surface:#0e1219;
  --card:#141820;
  --border:#1f2630;
  --accent:#00ff88;
  --accent2:#0088ff;
  --text:#e2e8f0;
  --muted:#4a5568;
  --danger:#ff4466;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

/* animated bg */
.bg-grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,255,136,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,136,.03) 1px,transparent 1px);
  background-size:40px 40px;
  animation:gridMove 20s linear infinite;
  pointer-events:none;
}
@keyframes gridMove{to{background-position:40px 40px}}

.glow-orb{
  position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;
  animation:orbFloat 8s ease-in-out infinite;
}
.orb1{width:500px;height:500px;background:rgba(0,255,136,.06);top:-100px;right:-100px;}
.orb2{width:400px;height:400px;background:rgba(0,136,255,.05);bottom:-80px;left:-80px;animation-delay:-4s;}
@keyframes orbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}

.hero{
  position:relative;z-index:1;text-align:center;
  animation:fadeUp .8s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.logo-badge{
  display:inline-flex;align-items:center;gap:8px;
  border:1px solid rgba(0,255,136,.2);
  background:rgba(0,255,136,.05);
  padding:6px 16px;border-radius:50px;
  font-size:12px;color:var(--accent);letter-spacing:.1em;
  text-transform:uppercase;margin-bottom:32px;
  font-family:'JetBrains Mono',monospace;
}
.logo-badge::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--accent);animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(60px,12vw,110px);
  line-height:.9;
  letter-spacing:.03em;
  background:linear-gradient(135deg,#fff 0%,var(--accent) 60%,var(--accent2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:20px;
}
.tagline{
  font-size:17px;color:var(--muted);max-width:420px;margin:0 auto 48px;
  line-height:1.7;font-weight:300;
}
.tagline strong{color:var(--text);font-weight:600}

.btn-group{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 32px;border-radius:10px;border:none;
  cursor:pointer;font-size:15px;font-weight:600;
  font-family:'Outfit',sans-serif;letter-spacing:.02em;
  transition:all .2s;text-decoration:none;
}
.btn-primary{
  background:var(--accent);color:#000;
  box-shadow:0 0 30px rgba(0,255,136,.2);
}
.btn-primary:hover{background:#00ffaa;transform:translateY(-2px);box-shadow:0 0 50px rgba(0,255,136,.4)}
.btn-outline{
  background:transparent;color:var(--text);
  border:1px solid var(--border);
}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}

.features{
  display:flex;gap:20px;justify-content:center;margin-top:56px;flex-wrap:wrap;
}
.feat{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:16px 20px;font-size:13px;color:var(--muted);
  display:flex;align-items:center;gap:10px;
  animation:fadeUp .8s ease both;
}
.feat:nth-child(1){animation-delay:.1s}
.feat:nth-child(2){animation-delay:.2s}
.feat:nth-child(3){animation-delay:.3s}
.feat-icon{font-size:18px}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow-orb orb1"></div>
<div class="glow-orb orb2"></div>

<div class="hero">
  <div class="logo-badge">
    <span>Stock Sense v2.0</span>
  </div>

  <h1>STOCK<br/>SENSE</h1>

  <p class="tagline">
    The <strong>smart supermarket OS</strong> that tracks inventory,
    generates invoices, and keeps your profits sharp.
  </p>

  <div class="btn-group">
    <a href="login.html" class="btn btn-primary">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
      Login
    </a>
    <a href="signup.html" class="btn btn-outline">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
      Create Account
    </a>
  </div>

  <div class="features">
    <div class="feat"><span class="feat-icon">📦</span> Live Inventory</div>
    <div class="feat"><span class="feat-icon">🧾</span> Smart Billing</div>
    <div class="feat"><span class="feat-icon">📈</span> Profit Analytics</div>
    <div class="feat"><span class="feat-icon">🔔</span> Expiry Alerts</div>
  </div>
</div>

</body>
</html>
